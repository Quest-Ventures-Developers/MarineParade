name: Import Zoepham Photos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: import-zoepham-photos
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONUNBUFFERED: "1"
      FROM_FOLDER: "01 Events"
      TO_FOLDER: "./export/zoepham"
      TEMP_FOLDER: "./tmp/downloads"
      STATE_FILE: "./zoepham_imported_state.json"
      RESIZE_PERCENT: "70"
      TIMEZONE: "Asia/Ho_Chi_Minh"
      LOG_LEVEL: "INFO"
      EMAIL_TO: "photos@marineparade.sg,zoe.pham@questventures.com,godricang@gmail.com,administrators@marineparade.com"
      RESEND_FROM: "NextGen Gallery Bot <no-reply@marineparade.sg>"
      GOOGLE_CREDENTIALS_JSON: "./credentials.json"
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing GOOGLE_SERVICE_ACCOUNT_JSON secret" >&2
            exit 1
          fi
          umask 077
          printf '%s' "${GOOGLE_SERVICE_ACCOUNT_JSON}" > credentials.json

      - name: Run importer
        run: python scripts/import_zoepham_photos.py

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WP_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.WP_SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "${SSH_PRIVATE_KEY}" ] || [ -z "${SSH_KNOWN_HOSTS}" ]; then
            echo "Missing WP_SSH_PRIVATE_KEY or WP_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync photos to WordPress
        env:
          WP_SSH_USER: ${{ secrets.WP_SSH_USER }}
          WP_SSH_HOST: ${{ secrets.WP_SSH_HOST }}
          WP_TARGET_DIR: ${{ secrets.WP_TARGET_DIR }}
        run: |
          if [ -z "${WP_SSH_USER}" ] || [ -z "${WP_SSH_HOST}" ] || [ -z "${WP_TARGET_DIR}" ]; then
            echo "Missing WP_SSH_USER, WP_SSH_HOST, or WP_TARGET_DIR secret" >&2
            exit 1
          fi
          case "${WP_TARGET_DIR}" in
            /home/*/www/*) ;;
            *)
              echo "Unsafe WP_TARGET_DIR path" >&2
              exit 1
              ;;
          esac
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./export/zoepham/ "${WP_SSH_USER}@${WP_SSH_HOST}:${WP_TARGET_DIR}/"

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f zoepham_imported_state.json ]; then
            git add zoepham_imported_state.json
            if ! git diff --cached --quiet; then
              git commit -m "chore: update zoepham imported state"
              git push
            else
              echo "No state changes to commit"
            fi
          else
            echo "State file not present; nothing to commit"
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
